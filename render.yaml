services:
  - type: web
    name: dominzo
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: DOMINZO_DB
        value: /var/data/dominzo.db
      - key: DOMINZO_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "22"
    disk:
      name: dominzo-data
      mountPath: /var/data
      sizeGB: 1
